<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>estimate · pro + admin + share · painter & plumber & carpenter</title>
    <!-- Roboto Mono – refined monospace -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- html2canvas for screenshot, jspdf for pdf generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #c0c0c0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Roboto Mono', 'Courier New', monospace;
            padding: 32px 16px;
        }

        /* Control bar from v1 */
        .control-bar {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid #b9b9b9;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #aaa;
            transition: 0.2s;
            border-radius: 26px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }
        
        input:checked + .slider { background-color: #1c1c1c; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Button styles */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .btn {
            background: #1c1c1c;
            border: none;
            color: white;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.75rem;
            font-weight: 400;
            padding: 8px 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid #1c1c1c;
            transition: 0.15s;
            border-radius: 4px;
            white-space: nowrap;
        }

        .btn-outline {
            background: transparent;
            color: #1c1c1c;
        }

        .btn:hover {
            background: #3a3a3a;
            border-color: #3a3a3a;
            color: white;
        }

        .btn-outline:hover {
            background: #1c1c1c;
            color: white;
        }

        .btn-share {
            background: #0066cc;
            border-color: #0066cc;
        }
        
        .btn-share:hover {
            background: #0052a3;
            border-color: #0052a3;
        }
        
        .btn-warning {
            background: #cc7a00;
            border-color: #cc7a00;
        }
        
        .btn-warning:hover {
            background: #b36b00;
            border-color: #b36b00;
        }

        /* receipt card – premium paper feel */
        .receipt {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            color: #1e1e1e;
            padding: 42px 38px 48px 38px;
            border: 1px solid #b9b9b9;
            box-shadow: 0 20px 36px -14px rgba(0, 0, 0, 0.25);
            font-size: 13px;
            line-height: 1.65;
            margin-bottom: 28px;
        }

        .header {
            margin-bottom: 38px;
            border-bottom: 1px solid #222;
            padding-bottom: 16px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #000;
            line-height: 1.2;
        }

        .header p {
            font-size: 0.7rem;
            font-weight: 300;
            text-transform: uppercase;
            color: #4f4f4f;
            letter-spacing: 0.8px;
        }

        .section {
            margin-bottom: 52px;
            position: relative;
        }

        .section-title {
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 1.8px solid #1a1a1a;
            padding-bottom: 8px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-controls {
            display: flex;
            gap: 8px;
        }

        /* rows */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 6px 0 5px 0;
            border-bottom: 1px dotted #bcbcbc;
            font-size: 0.9rem;
            position: relative;
        }

        .desc {
            font-weight: 350;
            color: #2b2b2b;
            padding-right: 24px;
            flex: 1;
        }

        .price {
            font-weight: 500;
            color: #1a1a1a;
            white-space: nowrap;
            text-align: right;
            font-size: 0.94rem;
        }
        
        .row-remove {
            margin-left: 10px;
            color: #aa2222;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            user-select: none;
            display: none;
        }
        
        .row-remove:hover { color: #ff0000; }
        
        body.admin-mode .row-remove { display: inline; }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 550;
            font-size: 0.96rem;
            padding: 10px 0 6px;
            margin-top: 6px;
            border-bottom: 1px dashed #7a7a7a;
            background-color: #f9f9f9;
        }

        .section-total {
            display: flex;
            justify-content: space-between;
            font-weight: 650;
            font-size: 1.25rem;
            padding: 18px 0 8px;
            margin-top: 20px;
            border-top: 3px double #1f1f1f;
        }

        .note-block {
            font-size: 0.7rem;
            color: #4b4b4b;
            border-top: 1px dashed #aaa;
            margin-top: 26px;
            padding-top: 14px;
            line-height: 1.7;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge {
            background: #ececec;
            padding: 2px 10px;
            font-weight: 400;
            color: #1e1e1e;
            font-size: 0.65rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .grand-container {
            margin-top: 48px;
            border-top: 2px solid #1d1d1d;
            padding-top: 24px;
        }

        .grand-row {
            display: flex;
            justify-content: space-between;
            font-weight: 650;
            font-size: 1.7rem;
            color: #000;
            letter-spacing: -0.5px;
        }

        .grand-label {
            font-size: 0.9rem;
            font-weight: 400;
            align-self: flex-end;
            padding-bottom: 4px;
            color: #3e3e3e;
            text-transform: uppercase;
        }

        .footer {
            margin-top: 32px;
            border-top: 1px solid #222;
            padding-top: 16px;
            font-size: 0.65rem;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
            color: #4e4e4e;
            font-weight: 350;
            letter-spacing: 0.2px;
        }

        /* editable indication */
        [contenteditable="true"] {
            cursor: text;
            border-radius: 0;
            transition: background 0.1s;
        }

        [contenteditable="true"]:hover {
            background-color: #f4f4f4;
        }

        [contenteditable="true"]:focus {
            outline: 1px solid #8a8a8a;
            background-color: #fbfbfb;
        }
        
        /* Admin-only elements */
        .admin-control {
            display: none;
        }
        
        body.admin-mode .admin-control {
            display: flex;
            gap: 8px;
        }
        
        body.admin-mode .add-section-btn {
            display: block;
        }
        
        .add-section-btn {
            width: 100%;
            text-align: center;
            margin: 16px 0 8px;
            display: none;
        }

        .hint {
            font-size: 0.6rem;
            color: #7a7a7a;
            max-width: 560px;
            text-align: center;
            font-weight: 300;
            margin-top: 4px;
        }
        
        .ios-hint {
            display: none;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 0.7rem;
            max-width: 560px;
        }
        
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1c1c;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.8rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .toast-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- iOS hint for Koder users -->
    <div class="ios-hint" id="iosHint">
        📱 <strong>iOS Koder:</strong> Use Share button for Messages/Mail/Files • Preview to save image • Open in Safari for full PDF download
    </div>

    <!-- Control bar with admin toggle and share buttons -->
    <div class="control-bar">
        <div class="toggle-container">
            <span style="font-size:0.8rem;">View</span>
            <label class="toggle-switch">
                <input type="checkbox" id="adminToggle">
                <span class="slider"></span>
            </label>
            <span style="font-size:0.8rem;">Admin</span>
        </div>
        
        <div class="btn-group">
            <button class="btn" id="previewPNG">Preview</button>
            <button class="btn btn-outline" id="copyBtn">📋 Copy</button>
            <button class="btn btn-share" id="shareBtn">📤 Share PDF</button>
            <button class="btn btn-outline" id="savePDF">💾 Save</button>
            <button class="btn btn-warning" id="refreshBtn">⟲ Reset</button>
        </div>
    </div>

    <!-- RECEIPT – DYNAMICALLY GENERATED -->
    <div class="receipt" id="receiptContainer"></div>

    <div class="hint">admin mode enables add/delete · click any text to edit · auto-saves · reset button clears storage</div>
    
    <!-- Toast notification -->
    <div class="toast-message" id="toast"></div>

    <script>
        (function() {
            // Master template - this is the source of truth for the default layout
            const MASTER_TEMPLATE = {
                header: { 
                    h1: "ESTIMATE · 2703", 
                    p: "17 march 2026  //  interior/exterior + water system + carpentry"
                },
                sections: [
                    {
                        title: "painter · screed & paint",
                        items: [
                            // Interior materials group
                            { desc: "Pop cement (6 bags) — phase 1: 5 bags", price: 69000 },
                            { desc: "Pop paint (8 drums) — phase 1: 6 drums", price: 72000 },
                            { desc: "Topbond (10 kg)", price: 31000 },
                            { desc: "Smooth sandpaper (5 yards)", price: 5000 },
                            { desc: "Masking tape (4 pcs)", price: 6000 },
                            { desc: "Black gloss – window (1 gal)", price: 20000 },
                            { desc: "Nylon protective sheet", price: 5000 },
                            { desc: "White emulsion – ceilings (6 drums)", price: 108000 },
                            { desc: "Gloss – stair railing (½ gal)", price: 10000 },
                            { desc: "White satin drum (2 drums)", price: 130000 },
                            { desc: "White satin gallon (2)", price: 27000 },
                            // Interior subtotal row (special item type)
                            { desc: "SUB:interior materials", price: 483000, isSubtotal: true },
                            // Exterior + logistics
                            { desc: "Beige emulsion – exterior (15 drums)", price: 270000 },
                            { desc: "Beige emulsion – fence (6 drums)", price: 108000 },
                            { desc: "Texture paint – fence (1 drum)", price: 27000 },
                            { desc: "Transportation", price: 10000 },
                            { desc: "Ladder hire (5 days)", price: 25000 },
                            { desc: "SUB:exterior + logistics", price: 440000, isSubtotal: true },
                            { desc: "Workmanship (labour)", price: 700000 }
                        ],
                        note: "pop cement/paint phased · ladder 5 days included"
                    },
                    {
                        title: "plumber · connectors & treatment",
                        items: [
                            // Connectors group
                            { desc: "Flexible connector (15)", price: 37500 },
                            { desc: "Tee tap (15)", price: 37500 },
                            { desc: "Palm connector (5)", price: 32500 },
                            { desc: "M/F socket (20)", price: 4000 },
                            { desc: "Shower (2)", price: 30000 },
                            { desc: "SUB:connectors subtotal", price: 141500, isSubtotal: true },
                            // Treatment group
                            { desc: "Geepee tank 2000L", price: 0 },
                            { desc: "Geepee tank 1200L", price: 0 },
                            { desc: "Fibers / medias / chemicals", price: 0 },
                            { desc: "treatment package (lump sum)", price: 1815000 }
                        ],
                        note: "all connectors & treatment as specified"
                    },
                    {
                        title: "carpenter · option A (premium)",
                        items: [
                            { desc: "HDF board (7 pcs @39,000)", price: 273000 },
                            { desc: "Plywood for door (16 pcs @15,000)", price: 240000 },
                            { desc: "To bond (adhesive)", price: 20000 },
                            { desc: "Bond glue (8 packs)", price: 120000 },
                            { desc: "Nails and filler", price: 10000 },
                            { desc: "Door hinge", price: 20000 },
                            { desc: "Keys (8 pcs @18,000)", price: 144000 },
                            { desc: "Paint", price: 40000 },
                            { desc: "Rubber for net", price: 10000 },
                            { desc: "Sardines sealer", price: 10000 },
                            { desc: "Thinner", price: 5000 },
                            { desc: "Edges tape", price: 12000 },
                            { desc: "Evo still gum", price: 15000 },
                            { desc: "Net", price: 30000 },
                            { desc: "Transport", price: 20000 },
                            { desc: "Workmanship", price: 250000 }
                        ],
                        note: "option A – detailed premium materials, total ~1,219,000 (adjust as needed)"
                    },
                    {
                        title: "carpenter · option B (economy)",
                        items: [
                            { desc: "HDF board (7 pcs @39,000)", price: 273000 },
                            { desc: "Body filler", price: 120000 },
                            { desc: "Nail and sand paper", price: 15000 },
                            { desc: "Hinge", price: 20000 },
                            { desc: "Keys (8 packs @18,000)", price: 144000 },
                            { desc: "Paint", price: 30000 },
                            { desc: "Rubber for net", price: 10000 },
                            { desc: "Sardines sealer", price: 10000 },
                            { desc: "Thinner", price: 8000 },
                            { desc: "Adiner (adhesive?)", price: 15000 },
                            { desc: "Handie (handles?)", price: 6000 },
                            { desc: "Net", price: 30000 },
                            { desc: "Transport", price: 20000 },
                            { desc: "Workmanship", price: 200000 }
                        ],
                        note: "option B – simplified materials, total ~901,000 (workmanship included)"
                    }
                ],
                footer: { 
                    left: "ref: est#2703", 
                    center: "17 march 2026", 
                    right: "contractor copy · incl. carpenter options" 
                }
            };

            // Initialize quoteData from localStorage or use master template
            let quoteData = JSON.parse(JSON.stringify(MASTER_TEMPLATE)); // Deep copy
            
            const STORAGE_KEY = 'quoteBuilderEnhanced';
            const saved = localStorage.getItem(STORAGE_KEY);
            
            // Only load from localStorage if it exists AND we're not forcing a reset
            // We'll check for a session flag to prevent unwanted loading
            const forceMaster = sessionStorage.getItem('forceMasterTemplate');
            
            if (saved && !forceMaster) {
                try { 
                    const parsed = JSON.parse(saved);
                    // Validate that parsed data has the expected structure
                    if (parsed && parsed.sections && parsed.sections.length > 0) {
                        quoteData = parsed;
                    }
                } catch(e) {
                    console.log('Using master template due to parse error');
                }
            }
            
            // Clear the force flag if it exists
            sessionStorage.removeItem('forceMasterTemplate');

            const receiptEl = document.getElementById('receiptContainer');
            const body = document.body;
            const toastEl = document.getElementById('toast');

            function showToast(message) {
                toastEl.textContent = message;
                toastEl.classList.add('show');
                setTimeout(() => {
                    toastEl.classList.remove('show');
                }, 2000);
            }

            function formatPrice(num) { 
                return '₦' + num.toLocaleString('en-NG'); 
            }

            function calculateSectionTotal(items) {
                return items.reduce((sum, it) => {
                    if (it.isSubtotal) return sum;
                    return sum + (it.price || 0);
                }, 0);
            }

            function render() {
                const isAdmin = body.classList.contains('admin-mode');
                let html = '';

                // Header
                html += `<div class="header">`;
                html += `<h1 contenteditable="${isAdmin}">${quoteData.header.h1}</h1>`;
                html += `<p contenteditable="${isAdmin}">${quoteData.header.p}</p>`;
                html += `</div>`;

                // Sections
                quoteData.sections.forEach((section, secIdx) => {
                    html += `<div class="section" data-section-index="${secIdx}">`;
                    
                    // Section title with admin controls
                    html += `<div class="section-title">`;
                    html += `<span contenteditable="${isAdmin}">${section.title}</span>`;
                    if (isAdmin) {
                        html += `<span class="section-controls admin-control">`;
                        html += `<button class="btn btn-outline add-item-btn" data-section="${secIdx}" style="padding:4px 8px;">+ item</button>`;
                        html += `<button class="btn btn-outline remove-section-btn" data-section="${secIdx}" style="padding:4px 8px;">✕ section</button>`;
                        html += `</span>`;
                    }
                    html += `</div>`;

                    // Items
                    section.items.forEach((item, itemIdx) => {
                        const isSubtotal = item.isSubtotal;
                        const rowClass = isSubtotal ? 'total-row' : 'row';
                        
                        html += `<div class="${rowClass}" data-item-index="${itemIdx}" data-is-subtotal="${isSubtotal || false}">`;
                        
                        if (isSubtotal) {
                            const label = item.desc.replace('SUB:', '');
                            html += `<span contenteditable="${isAdmin}">${label}</span>`;
                            html += `<span class="price" contenteditable="${isAdmin}">${formatPrice(item.price)}</span>`;
                        } else {
                            html += `<span class="desc" contenteditable="${isAdmin}">${item.desc}</span>`;
                            html += `<span class="price" contenteditable="${isAdmin}">${formatPrice(item.price)}</span>`;
                        }
                        
                        if (isAdmin && !isSubtotal) {
                            html += `<span class="row-remove admin-control" data-section="${secIdx}" data-item="${itemIdx}">✕</span>`;
                        }
                        
                        html += `</div>`;
                    });

                    // Section total
                    const secTotal = calculateSectionTotal(section.items);
                    html += `<div class="section-total">`;
                    html += `<span contenteditable="${isAdmin}">${section.title} total</span>`;
                    html += `<span>${formatPrice(secTotal)}</span>`;
                    html += `</div>`;

                    // Note block
                    html += `<div class="note-block">`;
                    html += `<span class="badge" contenteditable="${isAdmin}">${section.title} note</span>`;
                    html += `<span contenteditable="${isAdmin}">${section.note}</span>`;
                    html += `</div>`;

                    html += `</div>`;
                });

                // Add section button (admin only)
                if (isAdmin) {
                    html += `<div class="add-section-btn admin-control">`;
                    html += `<button class="btn" id="addSectionBtn">+ add new trade section</button>`;
                    html += `</div>`;
                }

                // Grand total area – dynamically list all section totals
                html += `<div class="grand-container">`;
                
                // List each section total
                quoteData.sections.forEach((section, idx) => {
                    const secTotal = calculateSectionTotal(section.items);
                    html += `<div style="display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 400; color: #333; margin-bottom: 8px;" contenteditable="${isAdmin}">`;
                    html += `<span>${section.title}</span><span>${formatPrice(secTotal)}</span>`;
                    html += `</div>`;
                });

                // Grand total (sum of all section totals)
                const grandTotal = quoteData.sections.reduce((sum, section) => sum + calculateSectionTotal(section.items), 0);
                html += `<div class="grand-row" contenteditable="${isAdmin}">`;
                html += `<span class="grand-label" contenteditable="${isAdmin}">grand total</span>`;
                html += `<span>${formatPrice(grandTotal)}</span>`;
                html += `</div>`;
                html += `</div>`;

                // Footer
                html += `<div class="footer">`;
                html += `<span contenteditable="${isAdmin}">${quoteData.footer.left}</span>`;
                html += `<span contenteditable="${isAdmin}">${quoteData.footer.center}</span>`;
                html += `<span contenteditable="${isAdmin}">${quoteData.footer.right}</span>`;
                html += `</div>`;

                receiptEl.innerHTML = html;

                if (isAdmin) attachAdminListeners();
                attachSaveListeners();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(quoteData));
            }

            function attachAdminListeners() {
                document.querySelectorAll('.row-remove').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const secIdx = btn.dataset.section;
                        const itemIdx = btn.dataset.item;
                        if (secIdx !== undefined && itemIdx !== undefined) {
                            const item = quoteData.sections[secIdx].items[itemIdx];
                            if (item && item.isSubtotal) {
                                alert('Subtotal rows cannot be deleted.');
                                return;
                            }
                            quoteData.sections[secIdx].items.splice(itemIdx, 1);
                            render();
                            showToast('Item removed');
                        }
                    });
                });

                document.querySelectorAll('.add-item-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const secIdx = btn.dataset.section;
                        if (secIdx !== undefined) {
                            quoteData.sections[secIdx].items.push({ desc: 'new item', price: 0 });
                            render();
                            showToast('Item added');
                        }
                    });
                });

                document.querySelectorAll('.remove-section-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const secIdx = btn.dataset.section;
                        if (secIdx !== undefined && quoteData.sections.length > 1) {
                            quoteData.sections.splice(secIdx, 1);
                            render();
                            showToast('Section removed');
                        } else {
                            alert('Cannot delete the only section.');
                        }
                    });
                });

                const addSec = document.getElementById('addSectionBtn');
                if (addSec) {
                    addSec.addEventListener('click', () => {
                        quoteData.sections.push({ 
                            title: 'new trade', 
                            items: [{ desc: 'new item', price: 0 }], 
                            note: 'add notes here' 
                        });
                        render();
                        showToast('Section added');
                    });
                }
            }

            function attachSaveListeners() {
                receiptEl.querySelectorAll('[contenteditable="true"]').forEach(field => {
                    field.addEventListener('blur', function() {
                        const parentRow = this.closest('.row, .total-row');
                        
                        if (parentRow) {
                            const secIdx = parentRow.closest('.section')?.dataset.sectionIndex;
                            const itemIdx = parentRow.dataset.itemIndex;
                            const isSubtotal = parentRow.dataset.isSubtotal === 'true';
                            
                            if (secIdx !== undefined && itemIdx !== undefined) {
                                const item = quoteData.sections[secIdx].items[itemIdx];
                                
                                if (this.classList.contains('desc') || parentRow.classList.contains('total-row')) {
                                    if (isSubtotal) {
                                        item.desc = 'SUB:' + this.innerText.trim();
                                    } else {
                                        item.desc = this.innerText.trim();
                                    }
                                } else if (this.classList.contains('price')) {
                                    const raw = this.innerText.replace(/[₦,]/g, '').trim();
                                    item.price = parseFloat(raw) || 0;
                                }
                            }
                        } else {
                            if (this.closest('.header')) {
                                if (this.tagName === 'H1') {
                                    quoteData.header.h1 = this.innerText.trim();
                                } else if (this.tagName === 'P') {
                                    quoteData.header.p = this.innerText.trim();
                                }
                            }

                            const sectionTitle = this.closest('.section-title')?.querySelector('span:first-child');
                            if (sectionTitle === this) {
                                const secDiv = this.closest('.section');
                                if (secDiv) {
                                    quoteData.sections[secDiv.dataset.sectionIndex].title = this.innerText.trim();
                                }
                            }

                            const noteBlock = this.closest('.note-block');
                            if (noteBlock && this !== noteBlock.querySelector('.badge')) {
                                const secDiv = this.closest('.section');
                                if (secDiv) {
                                    quoteData.sections[secDiv.dataset.sectionIndex].note = this.innerText.trim();
                                }
                            }

                            const footerSpans = this.closest('.footer')?.querySelectorAll('span');
                            if (footerSpans && footerSpans.length >= 3) {
                                quoteData.footer.left = footerSpans[0]?.innerText.trim() || quoteData.footer.left;
                                quoteData.footer.center = footerSpans[1]?.innerText.trim() || quoteData.footer.center;
                                quoteData.footer.right = footerSpans[2]?.innerText.trim() || quoteData.footer.right;
                            }
                        }
                        
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(quoteData));
                        showToast('Changes saved');
                    });
                });
            }

            // Reset to master template
            function resetToMaster() {
                if (confirm('Reset to default template? Any unsaved changes will be lost.')) {
                    // Set a flag to prevent loading from localStorage on next render
                    sessionStorage.setItem('forceMasterTemplate', 'true');
                    
                    // Clear localStorage
                    localStorage.removeItem(STORAGE_KEY);
                    
                    // Reset quoteData to master template
                    quoteData = JSON.parse(JSON.stringify(MASTER_TEMPLATE));
                    
                    // Re-render
                    render();
                    
                    showToast('Reset to default template');
                }
            }

            // Capture canvas helper
            async function captureCanvas() {
                return await html2canvas(receiptEl, {
                    scale: 2.2,
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: false,
                    useCORS: true,
                    windowWidth: receiptEl.scrollWidth,
                });
            }

            // ========== SHARE FUNCTIONS ==========
            
            // 1. Preview button
            document.getElementById('previewPNG').addEventListener('click', () => {
                captureCanvas().then(canvas => {
                    const image = canvas.toDataURL('image/png');
                    const newWindow = window.open('', '_blank');
                    newWindow.document.write(`
                        <html>
                        <head><title>estimate preview</title>
                        <style>
                            body { margin:0; display:flex; justify-content:center; background:#e2e2e2; }
                            img { max-width:100%; box-shadow:0 8px 20px rgba(0,0,0,0.2); }
                        </style>
                        </head>
                        <body>
                        <img src="${image}" alt="estimate preview">
                        </body>
                        </html>
                    `);
                }).catch(() => alert('Screenshot failed'));
            });

            // 2. Copy to clipboard (text)
            document.getElementById('copyBtn').addEventListener('click', () => {
                const text = receiptEl.innerText;
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✓ Quote copied to clipboard!');
                }).catch(() => {
                    // Fallback
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('✓ Quote copied!');
                });
            });

            // 3. SHARE PDF BUTTON
            document.getElementById('shareBtn').addEventListener('click', async () => {
                try {
                    const canvas = await captureCanvas();
                    
                    // Convert canvas to blob for sharing
                    canvas.toBlob(async (blob) => {
                        // Create a File object
                        const file = new File([blob], 'estimate.pdf', { 
                            type: 'application/pdf' 
                        });
                        
                        // Check if Web Share API is available with files
                        if (navigator.share && navigator.canShare({ files: [file] })) {
                            try {
                                await navigator.share({
                                    title: 'Construction Estimate',
                                    text: 'Painter, Plumber & Carpenter Quote',
                                    files: [file]
                                });
                                console.log('Shared successfully');
                            } catch (shareError) {
                                console.log('Share cancelled or failed');
                                // Fallback to PDF download
                                fallbackPDF();
                            }
                        } else {
                            // Web Share not supported, try PDF download
                            fallbackPDF();
                        }
                    }, 'application/pdf');
                    
                } catch (error) {
                    console.error('Share failed:', error);
                    alert('Sharing failed. Trying PDF download instead...');
                    fallbackPDF();
                }
            });

            // 4. Save PDF button
            document.getElementById('savePDF').addEventListener('click', fallbackPDF);
            
            // 5. Reset button
            document.getElementById('refreshBtn').addEventListener('click', resetToMaster);

            // Helper function for PDF generation
            async function fallbackPDF() {
                try {
                    const canvas = await captureCanvas();
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const { jsPDF } = window.jspdf;
                    
                    const pdf = new jsPDF({
                        orientation: 'portrait',
                        unit: 'px',
                        format: [canvas.width, canvas.height]
                    });
                    
                    pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height, undefined, 'FAST');
                    
                    // Try to save
                    pdf.save('estimate.pdf');
                    showToast('PDF saved');
                    
                    // For iOS, also offer alternative
                    if (navigator.userAgent.match(/iPad|iPhone|iPod/i)) {
                        setTimeout(() => {
                            if (!confirm('PDF download initiated. If file doesnt appear, use Share button instead.')) {
                                // Open in new tab as fallback
                                window.open(imgData, '_blank');
                            }
                        }, 1000);
                    }
                } catch (error) {
                    console.error('PDF failed:', error);
                    alert('PDF generation failed. Use Preview or Copy instead.');
                }
            }

            // Admin toggle
            const toggle = document.getElementById('adminToggle');
            toggle.addEventListener('change', (e) => {
                if (e.target.checked) {
                    body.classList.add('admin-mode');
                } else {
                    body.classList.remove('admin-mode');
                }
                render();
            });

            // Hide iOS hint if not on iOS
            if (!navigator.userAgent.match(/iPad|iPhone|iPod/i)) {
                document.getElementById('iosHint').style.display = 'none';
            }

            // Initial render
            body.classList.remove('admin-mode');
            toggle.checked = false;
            render();
        })();
    </script>
</body>
</html>
