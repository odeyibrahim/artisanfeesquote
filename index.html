<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Quote Builder · Optimised PDF</title>
    <!-- Roboto Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- html2canvas & jspdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* same styles as before – omitted for brevity, but included in full code below */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #c0c0c0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Roboto Mono', monospace;
            padding: 24px 16px;
        }
        .control-bar {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid #b9b9b9;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top:0; left:0; right:0; bottom:0;
            background-color: #aaa;
            transition: 0.2s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #1c1c1c; }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn {
            background: #1c1c1c;
            border: none;
            color: white;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.8rem;
            font-weight: 400;
            padding: 8px 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid #1c1c1c;
            transition: 0.15s;
            border-radius: 0;
        }
        .btn-outline {
            background: transparent;
            color: #1c1c1c;
        }
        .btn:hover {
            background: #3a3a3a;
            border-color: #3a3a3a;
            color: white;
        }
        .btn-outline:hover {
            background: #1c1c1c;
            color: white;
        }

        .receipt {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            color: #1e1e1e;
            padding: 42px 38px 48px 38px;
            border: 1px solid #b9b9b9;
            box-shadow: 0 20px 36px -14px rgba(0, 0, 0, 0.25);
            font-size: 13px;
            line-height: 1.65;
            margin-bottom: 28px;
        }
        .header {
            margin-bottom: 38px;
            border-bottom: 1px solid #222;
            padding-bottom: 16px;
        }
        .header h1 { font-size: 2rem; font-weight: 500; letter-spacing: -0.5px; color: #000; }
        .header p { font-size: 0.7rem; font-weight: 300; text-transform: uppercase; color: #4f4f4f; }

        .section { margin-bottom: 42px; }
        .section-title {
            font-weight: 600; font-size: 1.1rem; text-transform: uppercase;
            border-bottom: 1.8px solid #1a1a1a; padding-bottom: 8px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .section-title .section-controls { display: flex; gap: 8px; }

        .row {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 6px 0 5px; border-bottom: 1px dotted #bcbcbc; font-size: 0.9rem;
        }
        .desc { font-weight: 350; color: #2b2b2b; padding-right: 16px; flex: 1; }
        .price { font-weight: 500; color: #1a1a1a; white-space: nowrap; }
        .row-remove {
            margin-left: 10px; color: #aa2222; cursor: pointer; font-weight: bold;
            font-size: 1.1rem; user-select: none;
        }
        .row-remove:hover { color: #ff0000; }

        .section-total {
            display: flex; justify-content: space-between; font-weight: 650;
            font-size: 1.1rem; padding: 12px 0 4px; margin-top: 8px; border-top: 2px solid #444;
        }

        .note-block {
            font-size: 0.7rem; color: #4b4b4b; border-top: 1px dashed #aaa;
            margin-top: 20px; padding-top: 12px; line-height: 1.7;
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .badge {
            background: #ececec; padding: 2px 10px; font-weight: 400;
            color: #1e1e1e; font-size: 0.65rem; letter-spacing: 0.3px; text-transform: uppercase;
        }

        .grand-container { margin-top: 40px; border-top: 2px solid #1d1d1d; padding-top: 20px; }
        .grand-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.6rem; color: #000; }
        .grand-label { font-size: 0.9rem; font-weight: 400; align-self: flex-end; color: #3e3e3e; text-transform: uppercase; }

        .footer {
            margin-top: 28px; border-top: 1px solid #222; padding-top: 14px;
            font-size: 0.65rem; display: flex; justify-content: space-between;
            text-transform: uppercase; color: #4e4e4e; font-weight: 350;
        }

        .add-section-btn { width: 100%; text-align: center; margin: 16px 0 8px; }

        /* view mode hides admin controls */
        body:not(.admin-mode) .admin-control,
        body:not(.admin-mode) .row-remove,
        body:not(.admin-mode) .section-controls,
        body:not(.admin-mode) .add-section-btn {
            display: none !important;
        }
        body:not(.admin-mode) [contenteditable="true"] {
            contenteditable: false;
            pointer-events: none;
            background: transparent;
        }
        [contenteditable="true"]:hover { background-color: #f4f4f4; }
        [contenteditable="true"]:focus { outline: 1px solid #8a8a8a; background-color: #fbfbfb; }
    </style>
</head>
<body>
    <div class="control-bar">
        <div class="toggle-container">
            <span style="font-size:0.8rem;">👤 View</span>
            <label class="toggle-switch">
                <input type="checkbox" id="adminToggle">
                <span class="slider"></span>
            </label>
            <span style="font-size:0.8rem;">⚙️ Admin</span>
        </div>
        <div>
            <button class="btn" id="pdfBtn">Save as PDF</button>
        </div>
    </div>

    <div id="receiptContainer" class="receipt"></div>

    <script>
        (function() {
            // Default quote data (same as before)
            let quoteData = {
                header: { h1: "ESTIMATE · 2510", p: "10 march 2026  //  interior/exterior + water system" },
                sections: [
                    {
                        title: "painter · screed & paint",
                        items: [
                            { desc: "Pop cement (6 bags) — phase 1: 5 bags", price: 69000 },
                            { desc: "Pop paint (8 drums) — phase 1: 6 drums", price: 72000 },
                            { desc: "Topbond (10 kg)", price: 31000 },
                            { desc: "Smooth sandpaper (5 yards)", price: 5000 },
                            { desc: "Masking tape (4 pcs)", price: 6000 },
                            { desc: "Black gloss – window (1 gal)", price: 20000 },
                            { desc: "Nylon protective sheet", price: 5000 },
                            { desc: "White emulsion – ceilings (6 drums)", price: 108000 },
                            { desc: "Gloss – stair railing (½ gal)", price: 10000 },
                            { desc: "White satin drum (2 drums)", price: 130000 },
                            { desc: "White satin gallon (2)", price: 27000 },
                            { desc: "Beige emulsion – exterior (15 drums)", price: 270000 },
                            { desc: "Beige emulsion – fence (6 drums)", price: 108000 },
                            { desc: "Texture paint – fence (1 drum)", price: 27000 },
                            { desc: "Transportation", price: 10000 },
                            { desc: "Ladder hire (5 days)", price: 25000 },
                            { desc: "Workmanship (labour)", price: 700000 }
                        ],
                        note: "pop cement/paint phased · ladder 5 days included"
                    },
                    {
                        title: "plumber · connectors & treatment",
                        items: [
                            { desc: "Flexible connector (15)", price: 37500 },
                            { desc: "Tee tap (15)", price: 37500 },
                            { desc: "Palm connector (5)", price: 32500 },
                            { desc: "M/F socket (20)", price: 4000 },
                            { desc: "Shower (2)", price: 30000 },
                            { desc: "Geepee tank 2000L", price: 0 },
                            { desc: "Geepee tank 1200L", price: 0 },
                            { desc: "Fibers / medias / chemicals", price: 0 },
                            { desc: "treatment package (lump sum)", price: 1815000 }
                        ],
                        note: "all connectors & treatment as specified"
                    }
                ],
                footer: { left: "ref: est#2510", center: "10 march 2026", right: "contractor copy" }
            };

            const STORAGE_KEY = 'quoteBuilderState';
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) { try { quoteData = JSON.parse(saved); } catch(e) {} }

            const receiptEl = document.getElementById('receiptContainer');
            const body = document.body;

            function formatPrice(num) { return '₦' + num.toLocaleString('en-NG'); }

            function render() {
                const isAdmin = body.classList.contains('admin-mode');
                let html = '';

                // header
                html += `<div class="header"><h1 contenteditable="${isAdmin}">${quoteData.header.h1}</h1><p contenteditable="${isAdmin}">${quoteData.header.p}</p></div>`;

                // sections
                quoteData.sections.forEach((section, secIdx) => {
                    html += `<div class="section" data-section-index="${secIdx}">`;
                    html += `<div class="section-title"><span contenteditable="${isAdmin}">${section.title}</span>`;
                    if (isAdmin) {
                        html += `<span class="section-controls admin-control">`;
                        html += `<button class="btn btn-outline add-item-btn" data-section="${secIdx}" style="padding:4px 8px;">+ item</button>`;
                        html += `<button class="btn btn-outline remove-section-btn" data-section="${secIdx}" style="padding:4px 8px;">✕ section</button>`;
                        html += `</span>`;
                    }
                    html += `</div>`;

                    section.items.forEach((item, itemIdx) => {
                        html += `<div class="row" data-item-index="${itemIdx}">`;
                        html += `<span class="desc" contenteditable="${isAdmin}">${item.desc}</span>`;
                        html += `<span class="price" contenteditable="${isAdmin}">${formatPrice(item.price)}</span>`;
                        if (isAdmin) html += `<span class="row-remove admin-control" data-section="${secIdx}" data-item="${itemIdx}">✕</span>`;
                        html += `</div>`;
                    });

                    const secTotal = section.items.reduce((sum, it) => sum + it.price, 0);
                    html += `<div class="section-total"><span>section total</span><span>${formatPrice(secTotal)}</span></div>`;
                    html += `<div class="note-block" contenteditable="${isAdmin}"><span class="badge">${section.title} note</span><span contenteditable="${isAdmin}">${section.note}</span></div>`;
                    html += `</div>`;
                });

                if (isAdmin) {
                    html += `<div class="add-section-btn admin-control"><button class="btn" id="addSectionBtn">+ add new section</button></div>`;
                }

                const grandTotal = quoteData.sections.reduce((sum, sec) => sum + sec.items.reduce((s, it) => s + it.price, 0), 0);
                html += `<div class="grand-container">`;
                quoteData.sections.forEach((sec, i) => {
                    const secSum = sec.items.reduce((s, it) => s + it.price, 0);
                    html += `<div style="display:flex;justify-content:space-between;font-size:0.9rem;color:#333;margin-bottom:6px;" contenteditable="${isAdmin}"><span>${sec.title} total</span><span>${formatPrice(secSum)}</span></div>`;
                });
                html += `<div class="grand-row" contenteditable="${isAdmin}"><span class="grand-label">grand total</span><span>${formatPrice(grandTotal)}</span></div>`;
                html += `</div>`;

                html += `<div class="footer"><span contenteditable="${isAdmin}">${quoteData.footer.left}</span><span contenteditable="${isAdmin}">${quoteData.footer.center}</span><span contenteditable="${isAdmin}">${quoteData.footer.right}</span></div>`;

                receiptEl.innerHTML = html;

                if (isAdmin) attachAdminListeners();
            }

            function attachAdminListeners() {
                // Remove item
                document.querySelectorAll('.row-remove').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const secIdx = btn.dataset.section;
                        const itemIdx = btn.dataset.item;
                        if (secIdx !== undefined && itemIdx !== undefined) {
                            quoteData.sections[secIdx].items.splice(itemIdx, 1);
                            saveAndRender();
                        }
                    });
                });

                // Add item
                document.querySelectorAll('.add-item-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const secIdx = btn.dataset.section;
                        if (secIdx !== undefined) {
                            quoteData.sections[secIdx].items.push({ desc: 'new item', price: 0 });
                            saveAndRender();
                        }
                    });
                });

                // Remove section
                document.querySelectorAll('.remove-section-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const secIdx = btn.dataset.section;
                        if (secIdx !== undefined && quoteData.sections.length > 1) {
                            quoteData.sections.splice(secIdx, 1);
                            saveAndRender();
                        } else alert('Cannot delete the only section.');
                    });
                });

                // Add section
                const addSec = document.getElementById('addSectionBtn');
                if (addSec) addSec.addEventListener('click', () => {
                    quoteData.sections.push({ title: 'new section', items: [{ desc: 'new item', price: 0 }], note: 'add notes here' });
                    saveAndRender();
                });

                // Contenteditable blur saving
                receiptEl.querySelectorAll('[contenteditable="true"]').forEach(field => {
                    field.addEventListener('blur', function() {
                        const parentRow = this.closest('.row');
                        if (parentRow) {
                            const secIdx = parentRow.closest('.section')?.dataset.sectionIndex;
                            const itemIdx = parentRow.dataset.itemIndex;
                            if (secIdx !== undefined && itemIdx !== undefined) {
                                if (this.classList.contains('desc')) {
                                    quoteData.sections[secIdx].items[itemIdx].desc = this.innerText.trim();
                                } else if (this.classList.contains('price')) {
                                    const raw = this.innerText.replace(/[₦,]/g, '').trim();
                                    quoteData.sections[secIdx].items[itemIdx].price = parseFloat(raw) || 0;
                                }
                            }
                        } else {
                            // header, section title, note, footer
                            if (this.closest('.header')?.querySelector('h1') === this) quoteData.header.h1 = this.innerText.trim();
                            if (this.closest('.header')?.querySelector('p') === this) quoteData.header.p = this.innerText.trim();

                            const sectionTitle = this.closest('.section-title')?.querySelector('span:first-child');
                            if (sectionTitle === this) {
                                const secDiv = this.closest('.section');
                                if (secDiv) quoteData.sections[secDiv.dataset.sectionIndex].title = this.innerText.trim();
                            }

                            const noteBlock = this.closest('.note-block');
                            if (noteBlock && this !== noteBlock.querySelector('.badge')) {
                                const secDiv = this.closest('.section');
                                if (secDiv) quoteData.sections[secDiv.dataset.sectionIndex].note = this.innerText.trim();
                            }

                            const footerSpans = this.closest('.footer')?.querySelectorAll('span');
                            if (footerSpans) {
                                quoteData.footer.left = footerSpans[0]?.innerText.trim() || quoteData.footer.left;
                                quoteData.footer.center = footerSpans[1]?.innerText.trim() || quoteData.footer.center;
                                quoteData.footer.right = footerSpans[2]?.innerText.trim() || quoteData.footer.right;
                            }
                        }
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(quoteData));
                    });
                });
            }

            function saveAndRender() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(quoteData));
                render();
            }

            // Toggle admin mode
            const toggle = document.getElementById('adminToggle');
            toggle.addEventListener('change', (e) => {
                if (e.target.checked) body.classList.add('admin-mode');
                else body.classList.remove('admin-mode');
                render();
            });

            render();
            body.classList.remove('admin-mode');
            toggle.checked = false;

            // ---------- OPTIMISED PDF EXPORT ----------
            document.getElementById('pdfBtn').addEventListener('click', function() {
                const element = document.getElementById('receiptContainer');
                html2canvas(element, {
                    scale: 1.5,                 // lower scale = smaller file
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: false,
                    useCORS: true,
                }).then(canvas => {
                    // Use JPEG with 80% quality instead of PNG
                    const imgData = canvas.toDataURL('image/jpeg', 0.8);
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF({
                        orientation: 'portrait',
                        unit: 'px',
                        format: [canvas.width, canvas.height],
                        compress: true            // enable PDF compression
                    });
                    pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height, undefined, 'FAST');
                    pdf.save('quote.pdf');
                }).catch(err => {
                    alert('PDF generation failed. ' + err);
                });
            });
        })();
    </script>
</body>
</html>
